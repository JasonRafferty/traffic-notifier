<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Notifier</title>
    <link rel="stylesheet" href="./src/styles/style.css" />
  </head>
  <body class="bg-drift min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="w-full max-w-lg">

      <!-- Header -->
      <div class="mb-5 px-1">
        <h1 class="font-display text-5xl font-bold text-white tracking-widest uppercase leading-none">
          Traffic Notifier
        </h1>
        <p class="text-slate-500 text-sm mt-1.5">Should you drive today?</p>
      </div>

      <!-- Card -->
      <div class="bg-[#0D1526] border border-[#1E2D45] rounded-2xl p-6 space-y-4">

        <!-- Controls -->
        <div class="space-y-3">

          <!-- City dropdown -->
          <div class="relative">
            <select
              id="citySelect"
              class="w-full bg-[#0A0F1C] border border-[#1E2D45] text-white rounded-xl px-4 py-3 text-sm appearance-none cursor-pointer focus:outline-none focus:border-slate-500 transition-colors"
            >
              <option value="" disabled selected class="text-slate-500">Select a city</option>
              <option value="Manchester">Manchester</option>
              <option value="London">London</option>
              <option value="Birmingham">Birmingham</option>
              <option value="Liverpool">Liverpool</option>
              <option value="Newcastle">Newcastle</option>
              <option value="Leeds">Leeds</option>
              <option value="Sheffield">Sheffield</option>
              <option value="Nottingham">Nottingham</option>
              <option value="Leicester">Leicester</option>
              <option value="Southampton">Southampton</option>
              <option value="Wolverhampton">Wolverhampton</option>
              <option value="Sunderland">Sunderland</option>
              <option value="Glasgow">Glasgow</option>
              <option value="Edinburgh">Edinburgh</option>
              <option value="Cardiff">Cardiff</option>
              <option value="Belfast">Belfast</option>
            </select>
            <!-- Chevron -->
            <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-slate-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
              </svg>
            </div>
          </div>

          <!-- Date -->
          <div class="space-y-2">
            <input
              type="date"
              id="dateInput"
              class="w-full bg-[#0A0F1C] border border-[#1E2D45] text-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-slate-500 transition-colors"
            />
            <div class="flex gap-1.5">
              <button class="chip date-chip" data-key="today">Today</button>
              <button class="chip date-chip" data-key="tomorrow">Tomorrow</button>
              <button class="chip date-chip" data-key="sat">Sat</button>
              <button class="chip date-chip" data-key="sun">Sun</button>
            </div>
          </div>

          <!-- Time -->
          <div class="flex items-center gap-3">
            <input
              type="time"
              id="timeInput"
              class="w-36 shrink-0 bg-[#0A0F1C] border border-[#1E2D45] text-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-slate-500 transition-colors"
              aria-label="Filter by time (optional)"
            />
            <div class="flex gap-1.5 flex-wrap">
              <button class="chip time-chip" data-time="" title="No time filter">Any</button>
              <button class="chip time-chip" data-time="now" title="Set to current time">Now</button>
              <button class="chip time-chip" data-time="09:00" title="Morning – 9:00 AM">AM</button>
              <button class="chip time-chip" data-time="14:00" title="Afternoon – 2:00 PM">PM</button>
              <button class="chip time-chip" data-time="19:00" title="Evening – 7:00 PM">Eve</button>
            </div>
          </div>

          <!-- Search button -->
          <button
            id="inputButton"
            class="w-full bg-white text-[#0A0F1C] font-display font-bold text-xl tracking-widest uppercase py-3 rounded-xl hover:bg-slate-100 active:scale-[0.98] transition-all duration-150 cursor-pointer"
          >
            Search
          </button>

        </div>

        <!-- Verdict (traffic light + message) -->
        <div id="verdict"></div>

        <!-- Events list -->
        <div id="events-section" class="hidden">
          <div class="border-t border-[#1E2D45] pt-4">
            <p class="font-display text-xs font-semibold text-slate-500 tracking-widest uppercase mb-3">
              Upcoming Major Events
            </p>
            <div id="events"></div>
          </div>
        </div>

      </div>
    </div>

    <script type="module" src="./src/js/app.js"></script>
  </body>
</html>
